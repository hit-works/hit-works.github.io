<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HIT</title>
  <link rel="icon" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f424.svg" type="image/svg+xml" />
  <meta name="theme-color" content="#ffffff" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;color:#111;line-height:1.6;min-height:100vh}
    a{color:inherit;text-decoration:none}

    /* Nav */
    nav{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid #eee}
    .ni{max-width:640px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
    .logo{font-size:18px;font-weight:800;letter-spacing:-.5px}
    .nr{display:flex;gap:4px}
    .lb{padding:5px 12px;border-radius:6px;border:1px solid #ddd;background:0;color:#999;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
    .lb.on{background:#111;color:#fff;border-color:#111}

    /* Hero */
    .hero{text-align:center;padding:80px 20px 60px}
    .hero h1{font-size:clamp(28px,5vw,40px);font-weight:800;letter-spacing:-1px;line-height:1.2;margin-bottom:12px}
    .hero p{font-size:16px;color:#888;max-width:360px;margin:0 auto;line-height:1.7}

    /* Section */
    .sec{max-width:640px;margin:0 auto;padding:48px 20px}
    .sec h2{font-size:18px;font-weight:700;margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid #eee}

    /* Service cards */
    .sc{border:1px solid #eee;border-radius:14px;padding:24px;margin-bottom:14px;display:flex;gap:18px;align-items:flex-start;transition:border-color .2s}
    .sc:hover{border-color:#999}
    .sc-icon{width:56px;height:56px;border-radius:14px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
    .sc-body{flex:1;min-width:0}
    .sc-body h3{font-size:17px;font-weight:700;margin-bottom:4px}
    .sc-body p{font-size:14px;color:#888;line-height:1.7;margin-bottom:12px}
    .sc-tags{display:flex;gap:6px;flex-wrap:wrap}
    .sc-tag{font-size:12px;font-weight:600;padding:4px 10px;border-radius:6px;border:1px solid #ddd;color:#888;cursor:pointer;transition:all .2s;background:0;font-family:inherit}
    .sc-tag:hover{background:#111;color:#fff;border-color:#111}

    /* Footer */
    footer{max-width:640px;margin:0 auto;padding:40px 20px 60px;border-top:1px solid #eee;font-size:13px;color:#999;line-height:2.2}
    footer strong{color:#666}

  </style>
</head>
<body>

<nav><div class="ni">
  <a class="logo" href="/">HIT</a>
  <div class="nr">
    <button class="lb on" onclick="L('ko')">한국어</button>
    <button class="lb" onclick="L('en')">English</button>
  </div>
</div></nav>

<div class="hero">
  <h1>HIT</h1>
  <p data-ko="일상에 즐거움을 더하는 서비스를 만듭니다." data-en="We build services that add joy to everyday life.">일상에 즐거움을 더하는 서비스를 만듭니다.</p>
</div>

<div class="sec">
  <div class="sc">
    <div class="sc-icon">❤️</div>
    <div class="sc-body">
      <h3>Heart Rush</h3>
      <p data-ko="60초 안에 같은 색 하트를 찾는 캐주얼 게임. 매일 새로운 도전과 보상이 기다립니다." data-en="Find matching hearts in 60 seconds. Daily challenges and rewards await.">60초 안에 같은 색 하트를 찾는 캐주얼 게임. 매일 새로운 도전과 보상이 기다립니다.</p>
      <div class="sc-tags">
        <a class="sc-tag" href="/heart-rush/privacy/" data-ko="개인정보처리방침" data-en="Privacy Policy">개인정보처리방침</a>
      </div>
    </div>
  </div>

</div>

<footer>
  <strong data-ko="에이치아이티 (HIT)" data-en="HIT">에이치아이티 (HIT)</strong><br>
  <span data-ko="대표: 김하림" data-en="CEO: Harrim Kim">대표: 김하림</span><br>
  <span data-ko="사업자등록번호: 330-74-00635" data-en="Business Reg. No.: 330-74-00635">사업자등록번호: 330-74-00635</span><br>
  <span data-ko="주소: 인천광역시 부평구 후정로 8, 107동 1304호" data-en="Address: 107-1304, 8 Hujeong-ro, Bupyeong-gu, Incheon, Korea">주소: 인천광역시 부평구 후정로 8, 107동 1304호</span><br>
  <span data-ko="이메일: harrimkim@gmail.com" data-en="Email: harrimkim@gmail.com">이메일: harrimkim@gmail.com</span><br><br>
  &copy; 2026 HIT. All rights reserved.
</footer>

<script>
let l='ko';
function L(v){l=v;document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('on',b.textContent.trim()===(v==='ko'?'한국어':'English')));document.querySelectorAll('[data-ko][data-en]').forEach(e=>{const t=e.getAttribute('data-'+v);t.includes('\\n')?e.innerHTML=t.replace(/\\n/g,'<br>'):e.textContent=t});document.documentElement.lang=v}
const p=new URLSearchParams(location.search).get('lang');if(p)L(p);else if(!navigator.language.startsWith('ko'))L('en');
</script>

</body>
</html>
